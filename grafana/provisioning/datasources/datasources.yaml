apiVersion: 1

datasources:
  # ─── Grafana Tempo - Backend de traces ───────────────────────────────────────
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    isDefault: false
    jsonData:
      httpMethod: GET
      # Corrélation Trace -> Logs (Loki)
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
        query: '{service="${__span.tags["service.name"]}"} | json | trace_id="${__trace.traceId}"'
      # Corrélation Trace -> Métriques (Prometheus)
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request Rate
            query: 'rate(http_server_duration_count{service="$__tags{service}}[5m])'
          - name: Error Rate
            query: 'rate(http_server_duration_count{service="$__tags{service}", http_status_code=~"5.."}[5m])'
      # Service Graph
      serviceMap:
        datasourceUid: prometheus
      # Recherche de nœuds
      nodeGraph:
        enabled: true
      # Recherche TraceQL
      search:
        hide: false
      # Lien vers les logs
      lokiSearch:
        datasourceUid: loki
    version: 1
    editable: true

  # ─── Grafana Loki - Backend de logs ──────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: false
    jsonData:
      # Corrélation Log -> Trace (Tempo)
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"([a-f0-9]{32})"'
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: "Ouvrir dans Tempo"
    version: 1
    editable: true

  # ─── Prometheus - Backend de métriques ───────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        # Lien Exemplar (métrique) -> Trace (Tempo)
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "Voir dans Tempo"
    version: 1
    editable: true
